<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Share Markdown documents instantly via link" />
    <meta property="og:title" content="MD-Drop" />
    <meta property="og:description" content="Share Markdown documents instantly via link" />
    <meta property="og:type" content="website" />
    <title>MD-Drop</title>
    <script>
      ;(function () {
        var key = 'md-drop:theme'
        var stored = localStorage.getItem(key)
        var resolved = 'light'
        if (stored === 'dark' || stored === 'light') {
          resolved = stored
        } else {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
        }
        document.documentElement.setAttribute('data-theme', resolved)
        document.documentElement.style.colorScheme = resolved
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
